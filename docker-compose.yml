version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trustbridge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: trustbridge_password
      POSTGRES_DB: trustbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trustbridge-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: trustbridge-api
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash-lite
      DATABASE_URL: postgresql://postgres:trustbridge_password@postgres:5432/trustbridge
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-your_random_secret_key_here}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trustbridge-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: trustbridge-frontend
    environment:
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trustbridge-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  trustbridge-network:
    driver: bridge
